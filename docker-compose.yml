services:
  frontend:
    build:
      context: ./frontend
      target: development
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy

  backend:
    build:
      context: ./backend
    environment:
      APP_ENV: development
      CORS_ORIGINS: http://localhost:5173
      PORT: "8080"
    ports:
      - "8000:8080"
    volumes:
      - ./backend:/app
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')",
        ]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  frontend_node_modules:

